<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Docházka">
<meta name="theme-color" content="#C8A450">
<title>Docházka</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="32x32" href="icon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="shortcut icon" href="icon-32.png">
<link rel="manifest" href="manifest.json">
<style>

:root {
  --gold:#9A7010;--gold-bg:#FDF0C0;--gold-border:#D4A820;--gold-text:#6B4D08;
  --teal:#006B78;--teal-bg:#C8EDEF;--teal-border:#4DBFCA;--teal-text:#004450;
  --red:#B83030;--bg:#F7F6F3;--card:#FFFFFF;--border:#E0DDD8;--border2:#C8C5BF;
  --txt:#1A1A1A;--txt2:#6B6B6B;--txt3:#9A9A9A;--r:14px;--rs:10px;
  --font:Verdana,Geneva,sans-serif;
  --mono:Verdana,Geneva,sans-serif;
  --tabbar:64px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--font);background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;}

.page{position:fixed;inset:0;bottom:var(--tabbar);background:var(--bg);overflow-y:auto;transition:transform .3s cubic-bezier(.4,0,.2,1);}
.page.hidden{transform:translateX(100%);pointer-events:none;}

.topbar{background:#C8A450;padding:14px 16px 12px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;}
.topbar .app-name{font-size:17px;font-weight:600;color:#1A1A1A;letter-spacing:-.01em;flex:1;}

.tabbar{position:fixed;bottom:0;left:0;right:0;height:var(--tabbar);background:var(--card);border-top:1px solid var(--border);display:flex;z-index:20;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;font-family:var(--font);padding-bottom:4px;}
.tab .tab-icon{font-size:22px;line-height:1;}
.tab .tab-label{font-size:10px;font-weight:600;letter-spacing:.04em;color:var(--txt3);text-transform:uppercase;}
.tab.active .tab-label{color:var(--teal-text);}

/* HOME */
.main{padding:1.25rem 1rem 1rem;}
.header{text-align:center;margin-bottom:1.5rem;}
.header .wd{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);margin-bottom:3px;}
.header .ds{font-size:22px;font-weight:600;color:var(--txt);}
.slabel{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-bottom:8px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1rem;margin-bottom:1rem;}
.time-row{display:flex;gap:8px;}
.tbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 8px 8px;border:1px solid var(--border);border-radius:var(--rs);background:var(--bg);cursor:pointer;transition:all .15s;-webkit-appearance:none;}
.tbtn:active{transform:scale(.96);}
.tbtn.set{background:var(--gold-bg);border:2px solid var(--gold-border);}
.tbtn .ticon{font-size:20px;color:var(--txt3);line-height:1;}
.tbtn.set .ticon{color:var(--gold);}
.tbtn .tl{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--txt3);}
.tbtn.set .tl{color:var(--gold-text);}
.tbtn .tv{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--txt);min-height:24px;}
.tbtn.set .tv{color:var(--gold-text);}
.tbtn .th{font-size:10px;color:var(--txt3);min-height:13px;}
.time-edit{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.time-edit label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--txt3);white-space:nowrap;}
.time-edit input[type=time]{flex:1;font-family:var(--mono);font-size:16px;padding:7px 10px;border:1px solid var(--gold-border);border-radius:8px;background:#fff;color:var(--txt);height:38px;}
.time-edit input[type=date]{flex:1;font-family:var(--font);font-size:15px;padding:7px 10px;border:1px solid var(--gold-border);border-radius:8px;background:#fff;color:var(--txt);height:38px;}
.time-edit .clear-t{background:none;border:none;cursor:pointer;font-size:18px;color:var(--txt3);padding:4px;line-height:1;}
.time-edit .clear-t:active{color:var(--red);}
.dur-row{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.dur-lbl{font-size:12px;color:var(--txt2);}
.dur-v{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--teal);}
.loc-row{display:flex;gap:8px;}
.lbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;padding:14px 8px;border:1px solid var(--border);border-radius:var(--rs);background:var(--bg);cursor:pointer;transition:all .15s;-webkit-appearance:none;}
.lbtn:active{transform:scale(.96);}
.lbtn .licon{font-size:22px;line-height:1;}
.lbtn .ll{font-size:13px;font-weight:500;color:var(--txt2);}
.lbtn.sel{background:var(--teal-bg);border:2px solid var(--teal-border);}
.lbtn.sel .ll{color:var(--teal-text);font-weight:600;}
.save-arr{width:100%;padding:14px;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font);-webkit-appearance:none;background:var(--gold-bg);color:var(--gold-text);border:2px solid var(--gold-border);margin-bottom:.75rem;display:block;}
.save-arr:disabled{background:var(--bg);color:var(--txt3);border:1px solid var(--border);cursor:not-allowed;}
.save-arr:not(:disabled):active{transform:scale(.97);filter:brightness(.95);}
.save-full{width:100%;padding:14px;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font);-webkit-appearance:none;background:var(--teal-bg);color:var(--teal-text);border:2px solid var(--teal-border);display:block;}
.save-full:disabled{background:var(--bg);color:var(--txt3);border:1px solid var(--border);cursor:not-allowed;}
.save-full:not(:disabled):active{transform:scale(.97);filter:brightness(.95);}
.active-bar{margin-top:1.25rem;background:var(--gold-bg);border:2px solid var(--gold-border);border-radius:var(--r);padding:.85rem 1rem;display:flex;align-items:center;gap:10px;}
.active-bar .ab-dot{width:7px;height:7px;border-radius:50%;background:var(--gold-border);flex-shrink:0;animation:pulse 1.8s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
.active-bar .ab-info{flex:1;min-width:0;}
.active-bar .ab-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--gold-text);margin-bottom:2px;}
.active-bar .ab-detail{font-size:13px;color:var(--gold-text);display:flex;align-items:center;gap:6px;}
.active-bar .ab-time{font-family:var(--mono);font-weight:500;}
.active-bar .ab-loc{font-size:11px;color:var(--gold);opacity:.8;}
.active-bar .ab-dep-btn{background:var(--gold-border);color:var(--gold-text);border:none;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);white-space:nowrap;flex-shrink:0;}
.active-bar-expanded{margin-top:1.25rem;background:var(--gold-bg);border:2px solid var(--gold-border);border-radius:var(--r);padding:.85rem 1rem;}
.abe-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.abe-dot{width:7px;height:7px;border-radius:50%;background:var(--gold-border);flex-shrink:0;animation:pulse 1.8s infinite;}
.abe-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--gold-text);flex:1;}
.abe-cancel{background:none;border:none;font-size:13px;color:var(--gold-text);cursor:pointer;font-family:var(--font);opacity:.7;}
.abe-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.abe-row label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--gold-text);width:62px;flex-shrink:0;}
.abe-row input[type=time]{flex:1;font-family:var(--mono);font-size:16px;padding:7px 10px;border:1px solid var(--gold-border);border-radius:8px;background:#fff;color:var(--txt);height:38px;}
.abe-row input[type=date]{flex:1;font-family:var(--font);font-size:15px;padding:7px 10px;border:1px solid var(--gold-border);border-radius:8px;background:#fff;color:var(--txt);height:38px;}
.abe-dur{font-size:12px;color:var(--gold-text);margin-bottom:10px;font-family:var(--mono);opacity:.8;}
.abe-save{width:100%;padding:12px;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);background:var(--gold-border);color:var(--gold-text);border:none;}

/* ── CALENDAR / HISTORY ── */
.cal-page{padding:.75rem 1rem 2rem;}

/* month/year nav */
.cal-nav{display:flex;align-items:center;gap:6px;margin-bottom:1rem;}
.cal-nav-btn{background:none;border:1px solid var(--border);border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--txt2);flex-shrink:0;}
.cal-nav-btn:active{background:var(--border);}
.cal-title{flex:1;text-align:center;}
.cal-month{font-size:16px;font-weight:600;color:var(--txt);}
.cal-year-row{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:2px;}
.cal-year-btn{background:none;border:none;cursor:pointer;font-size:12px;color:var(--txt3);padding:2px 4px;}
.cal-year-btn.active{font-weight:700;color:var(--teal-text);}

/* day-of-week header */
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;}
.cal-dow-cell{text-align:center;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--txt3);padding:4px 0;}
.cal-dow-cell.we{color:#C0392B;}

/* calendar grid */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-day{height:58px;border-radius:7px;padding:4px 3px 3px;cursor:pointer;border:1px solid transparent;transition:all .12s;display:flex;flex-direction:column;background:var(--card);position:relative;overflow:hidden;}
.cal-day:active{transform:scale(.95);}
.cal-day.empty{background:transparent;border-color:transparent;cursor:default;pointer-events:none;}
.cal-day.today{border-color:var(--teal-border);border-width:2px;}
.cal-day.weekend{background:#FEF5F5;}
.cal-day.holiday{background:#FEF5F5;}
.cal-day.has-entry-office{background:var(--gold-bg);border-color:var(--gold-border);}
.cal-day.has-entry-home{background:var(--teal-bg);border-color:var(--teal-border);}
.cal-day.has-note{background:#EFEDE6;border-color:#C8C5BC;}
.cal-day.has-mixed-office{border-color:var(--gold-border);}
.cal-day.has-mixed-home{border-color:var(--teal-border);}
.cal-day .cd-num{font-size:12px;font-weight:600;color:var(--txt2);line-height:1;margin-bottom:2px;}
.cal-day.today .cd-num{color:var(--teal);font-weight:700;}
.cal-day.weekend .cd-num,.cal-day.holiday .cd-num{color:#C0392B;}
.cal-day.has-entry-office .cd-num,.cal-day.has-mixed-office .cd-num{color:var(--gold-text);}
.cal-day.has-entry-home .cd-num,.cal-day.has-mixed-home .cd-num{color:var(--teal-text);}
.cal-day.has-entry-office .cd-time,.cal-day.has-entry-office .cd-dur,
.cal-day.has-mixed-office .cd-time,.cal-day.has-mixed-office .cd-dur{color:var(--gold-text);}
.cal-day.has-mixed-home .cd-time,.cal-day.has-mixed-home .cd-dur{color:var(--teal-text);}
.cal-day .cd-time{font-family:var(--mono);font-size:9px;color:var(--teal-text);line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-day .cd-note{font-size:8px;color:#5A5A5A;line-height:1.2;margin-top:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-day .cd-hday{font-size:7.5px;color:#C0392B;line-height:1.15;margin-top:1px;}
.cal-day .cd-dur{font-size:8px;color:var(--teal);margin-top:auto;font-family:var(--mono);font-weight:600;}
.cal-day.has-mixed-office .cd-dur{color:var(--gold-text);}
.cal-day.has-mixed-home .cd-dur{color:var(--teal-text);}

/* month summary */
.cal-summary{margin-top:12px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:.85rem 1rem;display:flex;gap:0;}
.cal-sum-item{flex:1;text-align:center;}
.cal-sum-item+.cal-sum-item{border-left:1px solid var(--border);}
.cal-sum-val{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--txt);}
.cal-sum-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--txt3);margin-top:2px;}

/* ── DAY SHEET (bottom sheet) ── */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:50;opacity:0;transition:opacity .25s;pointer-events:none;}
.sheet-overlay.open{opacity:1;pointer-events:all;}
.sheet{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-radius:18px 18px 0 0;padding:0 1rem 2rem;z-index:51;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:88vh;overflow-y:auto;}
.sheet.open{transform:translateY(0);}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 14px;}
.sheet-title{font-size:16px;font-weight:600;color:var(--txt);margin-bottom:4px;}
.sheet-sub{font-size:12px;color:var(--txt3);margin-bottom:16px;}
.sheet-sub.holiday{color:#C0392B;}

/* sheet fields */
.sf-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--txt3);margin-bottom:6px;}
.sf-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.sf-row label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--txt3);width:58px;flex-shrink:0;}
.sf-row input[type=time]{flex:1;font-family:var(--mono);font-size:15px;padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--txt);height:36px;}
.sf-loc-row{display:flex;gap:6px;margin-bottom:14px;}
.sf-loc-btn{flex:1;padding:9px 4px;border:1px solid var(--border);border-radius:8px;background:var(--bg);cursor:pointer;font-size:12px;font-weight:500;color:var(--txt2);display:flex;align-items:center;justify-content:center;gap:5px;font-family:var(--font);}
.sf-loc-btn.sel{background:var(--teal-bg);border:2px solid var(--teal-border);color:var(--teal-text);font-weight:600;}
.sf-dur{font-size:12px;color:var(--teal);font-family:var(--mono);margin-bottom:12px;}

/* note type chips */
.sf-note-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.sf-chip{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:12px;font-weight:500;color:var(--txt2);font-family:var(--font);}
.sf-chip.sel{background:#EFEDE6;border-color:#C8C5BC;color:#4A4A4A;font-weight:600;}
.sf-note-input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--txt);font-size:14px;font-family:var(--font);margin-bottom:14px;resize:none;}
.sf-hours-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:8px 12px;}
.sf-hours-label{font-size:12px;font-weight:600;color:var(--txt2);flex:1;}
.sf-hours-ctrl{display:flex;align-items:center;gap:6px;}
.sf-hours-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:18px;font-weight:500;color:var(--txt);display:flex;align-items:center;justify-content:center;font-family:var(--font);}
.sf-hours-btn:active{background:var(--border);}
.sf-hours-val{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--txt);min-width:42px;text-align:center;}

.sheet-save{width:100%;padding:13px;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);background:var(--teal);color:#fff;border:none;margin-bottom:8px;}
.sheet-save:active{filter:brightness(.9);}
.sheet-del{width:100%;padding:10px;border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);background:none;color:var(--red);border:1px solid #F0CECE;}


/* EXPORT BUTTONS */
.export-row{display:flex;gap:8px;margin-top:10px;}
.export-btn{flex:1;padding:11px 8px;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:6px;border:1px solid var(--border);background:var(--card);color:var(--txt2);transition:all .15s;}
.export-btn:active{filter:brightness(.92);transform:scale(.97);}
.export-btn.primary{background:var(--teal-bg);color:var(--teal-text);border-color:var(--teal-border);}

/* VACATION CARD */
.vac-card{margin-top:10px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;cursor:pointer;}
.vac-card:active{background:var(--bg);}
.vac-main{display:flex;align-items:center;gap:8px;padding:11px 12px;}
.vac-icon{font-size:18px;flex-shrink:0;}
.vac-label{font-size:13px;font-weight:500;color:var(--txt2);flex:1;}
.vac-val{font-family:var(--mono);font-size:15px;font-weight:600;}
.vac-chevron{font-size:10px;color:var(--txt3);margin-left:4px;}
.vac-detail{padding:0 12px 12px;border-top:1px solid var(--border);}
.vac-detail-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--txt2);}
.vac-detail-row:last-child{border-bottom:none;}
.vac-total{font-weight:600;color:var(--txt);}
.vac-detail-edit{display:flex;align-items:center;gap:6px;}
.vac-adj-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:16px;font-weight:500;color:var(--txt);display:flex;align-items:center;justify-content:center;font-family:var(--font);}
.vac-adj-btn:active{background:var(--border);}

/* REMINDER */
.reminder-row{margin-top:8px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;}
.reminder-toggle{width:100%;display:flex;align-items:center;gap:10px;padding:11px 12px;cursor:pointer;border:none;background:none;font-family:var(--font);text-align:left;}
.reminder-toggle:active{background:var(--bg);}
.reminder-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border2);background:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.reminder-check.on{background:var(--teal);border-color:var(--teal);}
.reminder-check.on::after{content:'✓';color:#fff;font-size:12px;font-weight:700;}
.reminder-label{font-size:13px;font-weight:500;color:var(--txt2);flex:1;}
.reminder-label.on{color:var(--teal-text);font-weight:600;}
.reminder-detail{padding:0 12px 12px;display:flex;align-items:center;gap:8px;}
.reminder-detail label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--txt3);white-space:nowrap;}
.reminder-time-input{font-family:var(--mono);font-size:15px;padding:6px 10px;border:1px solid var(--teal-border);border-radius:8px;background:var(--bg);color:var(--txt);height:34px;flex:1;}
.reminder-note{font-size:11px;color:var(--txt3);margin-top:6px;padding:0 12px 10px;line-height:1.4;}

/* NAME BUTTON */
.name-btn{background:rgba(0,0,0,.12);border:none;border-radius:8px;padding:5px 10px;cursor:pointer;display:flex;align-items:center;gap:5px;max-width:160px;font-family:var(--font);}
.name-btn:active{background:rgba(0,0,0,.22);}
#name-display{font-size:13px;font-weight:600;color:#1A1A1A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px;}
.name-edit-icon{font-size:12px;flex-shrink:0;}

/* NAME EDIT OVERLAY */
.name-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:60;display:flex;align-items:flex-end;justify-content:center;}
.name-overlay.hidden{display:none;}
.name-card{background:var(--card);border-radius:18px 18px 0 0;padding:1.25rem 1rem 2rem;width:100%;max-width:480px;}
.name-card h3{font-size:15px;font-weight:600;color:var(--txt);margin-bottom:4px;}
.name-card p{font-size:12px;color:var(--txt3);margin-bottom:14px;}

}

<script>
const DAYS=['Neděle','Pondělí','Úterý','Středa','Čtvrtek','Pátek','Sobota'];
const DAYS_SHORT=['Ne','Po','Út','St','Čt','Pá','So'];
const MONTHS_LABEL=['ledna','února','března','dubna','května','června','července','srpna','září','října','listopadu','prosince'];
const MONTHS_NAMES=['Leden','Únor','Březen','Duben','Květen','Červen','Červenec','Srpen','Září','Říjen','Listopad','Prosinec'];

// Czech public holidays — fixed dates (MM-DD) + Easter computed
function getCzechHolidays(year){
  const fixed=[
    '01-01','05-01','05-08','07-05','07-06','09-28','10-28','11-17','12-24','12-25','12-26'
  ];
  // Easter Monday (anonymous Gaussian algorithm)
  const a=year%19,b=Math.floor(year/100),c=year%100;
  const d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25);
  const g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30;
  const i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7;
  const m=Math.floor((a+11*h+22*l)/451);
  const month=Math.floor((h+l-7*m+114)/31);
  const day=((h+l-7*m+114)%31)+1;
  const easter=new Date(year,month-1,day);
  const easterMon=new Date(easter);easterMon.setDate(easter.getDate()+1);
  const eM=(easterMon.getMonth()+1).toString().padStart(2,'0')+'-'+easterMon.getDate().toString().padStart(2,'0');
  return new Set([...fixed,eM]);
}

const HOLIDAY_NAMES={
  '01-01':'Nový rok','05-01':'Svátek práce','05-08':'Den vítězství',
  '07-05':'Cyril a Metoděj','07-06':'Jan Hus','09-28':'Den české státnosti',
  '10-28':'Vznik ČSR','11-17':'Den svobody','12-24':'Štědrý den',
  '12-25':'1. svátek vánoční','12-26':'2. svátek vánoční'
};

// ── STATE ──
let active=null,editId=null;
let st={arrival:null,arrivalDate:null,departure:null,departureDate:null,location:null};
let depExpanded=false;

// entries: work records {id,isoDate,date,day,arrival,departure,dur,loc}
// notes:   day annotations {isoDate, type:'vacation'|'sick'|'trip'|'custom', text}
let entries=[], notes=[];
let userName='';

// calendar view state
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth();

let reminderOn=false, reminderHour='09', reminderMin='00';
// vacationData: per year {carryoverDays, carryoverHours, baseDays=25}
let vacationData={};

try{
  const s=JSON.parse(localStorage.getItem('dochazka_v3')||'{}');
  active=s.active||null; entries=s.entries||[]; notes=s.notes||[]; userName=s.userName||'';
  reminderOn=s.reminderOn||false;
  reminderHour=s.reminderHour||'09';
  reminderMin=s.reminderMin||'00';
  vacationData=s.vacationData||{};
}catch(e){}

// autoCarryOver called after function definitions — see below

const fmt=d=>d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
function fmtDur(m){const h=Math.floor(m/60),r=m%60;return h+'h'+(r?r+'m':'');}
function fmtDurLong(m){const h=Math.floor(m/60),r=m%60;return h+' hod'+(r?' '+r+' min':'');}
function fmtOvertime(m){
  const sign=m>=0?'+':'-';
  const abs=Math.abs(m);
  const h=Math.floor(abs/60),r=abs%60;
  return sign+(h>0?h+'h':'')+(r>0?r+'m':'')+(h===0&&r===0?'0h':'');
}
function calcMin(a,d){if(!a||!d)return 0;const[ah,am]=a.split(':').map(Number),[dh,dm]=d.split(':').map(Number);return(dh*60+dm)-(ah*60+am);}
function nowStr(){return fmt(new Date());}
function toIso(d){return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0');}
function isoToDate(iso){const[y,m,d]=iso.split('-').map(Number);return new Date(y,m-1,d);}
function isoToLabel(iso){if(!iso)return{date:'',day:''};const dt=isoToDate(iso);return{date:dt.getDate()+'. '+MONTHS_LABEL[dt.getMonth()],day:DAYS[dt.getDay()].slice(0,2)};}
function dateLabel(n){return n.getDate()+'. '+MONTHS_LABEL[n.getMonth()];}
function dayLabel(n){return DAYS[n.getDay()].slice(0,2);}

function persist(){
  try{localStorage.setItem('dochazka_v3',JSON.stringify({active,entries:entries.slice(0,500),notes,userName,reminderOn,reminderHour,reminderMin,vacationData}));}catch(e){}
}
function persistVacation(){
  try{localStorage.setItem('dochazka_v3',JSON.stringify({active,entries:entries.slice(0,500),notes,userName,reminderOn,reminderHour,reminderMin,vacationData}));}catch(e){}
}

// ── TABS ──
function showTab(tab){
  document.getElementById('page-home').classList.toggle('hidden',tab!=='home');
  document.getElementById('page-history').classList.toggle('hidden',tab!=='history');
  document.getElementById('tab-home').classList.toggle('active',tab==='home');
  document.getElementById('tab-history').classList.toggle('active',tab==='history');
  if(tab==='history'){renderCalendar();updateNameDisplay();}
}

// ── HOME ──
function renderHome(){
  const n=new Date();
  let html='<div class="header"><div class="wd">'+DAYS[n.getDay()]+'</div><div class="ds">'+n.getDate()+'. '+MONTHS_LABEL[n.getMonth()]+' '+n.getFullYear()+'</div></div>';
  html+='<div class="slabel">Nový záznam</div>';
  html+='<div class="card"><div class="time-row">';
  html+='<button class="tbtn'+(st.arrival?' set':'')+'"'+(active?' disabled':'')+' onclick="tapTime(\'arrival\')">';
  html+='<span class="ticon">↪</span><span class="tl">Příchod</span><span class="tv">'+(st.arrival||'—')+'</span><span class="th">'+(st.arrival?'upravit':'')+'</span></button>';
  const depBtnActive=!!(active&&!depExpanded);
  html+='<button class="tbtn'+(st.departure||depBtnActive?' set':'')+'" onclick="'+(active?'expandDep()':'tapTime(\'departure\')')+'">';
  html+='<span class="ticon">↩</span><span class="tl">Odchod</span><span class="tv">'+(active&&!st.departure?'+ zadat':(st.departure||'—'))+'</span><span class="th">'+(st.departure?'upravit':active?'klepni':'')+'</span></button>';
  html+='</div>';
  if(st.arrival){
    const av=st.arrivalDate||toIso(new Date());
    html+='<div class="time-edit"><label>⏰ Příchod</label><input type="time" id="edit-arrival" value="'+st.arrival+'" oninput="onEditTime(\'arrival\')"><button class="clear-t" onclick="clearTime(\'arrival\')">✕</button></div>';
    html+='<div class="time-edit"><label>📅 Datum</label><input type="date" id="edit-arrival-date" value="'+av+'" oninput="onEditDate(\'arrival\')"></div>';
  }
  if(st.departure&&!active){
    const dv=st.departureDate||toIso(new Date());
    html+='<div class="time-edit"><label>⏰ Odchod</label><input type="time" id="edit-departure" value="'+st.departure+'" oninput="onEditTime(\'departure\')"><button class="clear-t" onclick="clearTime(\'departure\')">✕</button></div>';
    html+='<div class="time-edit"><label>📅 Datum</label><input type="date" id="edit-departure-date" value="'+dv+'" oninput="onEditDate(\'departure\')"></div>';
  }
  if(st.arrival&&st.departure&&!active){const diff=calcMin(st.arrival,st.departure);if(diff>0)html+='<div class="dur-row"><span class="dur-lbl">Odpracováno</span><span class="dur-v">'+fmtDurLong(diff)+'</span></div>';}
  html+='</div>';
  const locVal=active?active.loc:st.location;
  html+='<div class="slabel">Kde dnes pracuji</div><div class="card"><div class="loc-row">';
  html+='<button class="lbtn'+(locVal==='office'?' sel':'')+'"'+(active?' disabled':'')+' onclick="setLoc(\'office\')"><span class="licon">🏢</span><span class="ll">Kancelář</span></button>';
  html+='<button class="lbtn'+(locVal==='home'?' sel':'')+'"'+(active?' disabled':'')+' onclick="setLoc(\'home\')"><span class="licon">🏠</span><span class="ll">Homeoffice</span></button>';
  html+='</div></div>';
  const canArr=!!(st.arrival&&st.location&&!active);
  const canFull=!!(st.arrival&&st.departure&&st.location&&!active);
  html+='<button class="save-arr" onclick="saveArrival()"'+(canArr?'':' disabled')+'>Uložit příchod</button>';
  html+='<button class="save-full" onclick="saveEntry()"'+(canFull?'':' disabled')+'>Uložit záznam</button>';
  if(active){
    if(!depExpanded){
      html+='<div class="active-bar"><div class="ab-dot"></div><div class="ab-info"><div class="ab-label">Příchod uložen</div><div class="ab-detail"><span class="ab-time">'+active.arrival+'</span><span class="ab-loc">'+(active.loc==='office'?'🏢 Kan.':'🏠 HO')+'</span></div></div><button class="ab-dep-btn" onclick="expandDep()">+ Odchod</button></div>';
    } else {
      const dv=st.departure||nowStr(),ddv=st.departureDate||toIso(new Date());
      const diff=calcMin(active.arrival,dv);
      html+='<div class="active-bar-expanded"><div class="abe-header"><div class="abe-dot"></div><span class="abe-label">Zadat odchod (příchod: '+active.arrival+')</span><button class="abe-cancel" onclick="collapseDep()">Zrušit</button></div>';
      html+='<div class="abe-row"><label>⏰ Čas</label><input type="time" id="dep-input" value="'+dv+'" oninput="onDepInput()"></div>';
      html+='<div class="abe-row"><label>📅 Datum</label><input type="date" id="dep-date-input" value="'+ddv+'" oninput="onDepDateInput()"></div>';
      if(diff>0)html+='<div class="abe-dur">Odpracováno: '+fmtDurLong(diff)+'</div>';
      html+='<button class="abe-save" onclick="confirmDeparture()">Uložit odchod</button></div>';
    }
  }
  document.getElementById('home-main').innerHTML=html;
}

function tapTime(type){
  if(!st[type]){st[type]=nowStr();st[type+'Date']=toIso(new Date());}
  renderHome();
  setTimeout(()=>{const el=document.getElementById('edit-'+type);if(el)el.focus();},50);
}
function onEditTime(type){const el=document.getElementById('edit-'+type);if(el)st[type]=el.value;}
function onEditDate(type){const el=document.getElementById('edit-'+type+'-date');if(el)st[type+'Date']=el.value;}
function clearTime(type){st[type]=null;st[type+'Date']=null;renderHome();}
function setLoc(l){st.location=l;renderHome();}

function saveArrival(){
  if(!st.arrival||!st.location){toast('Vyplň příchod a místo.');return;}
  if(active){toast('Nejdřív dokonči předchozí záznam.');return;}
  const iso=st.arrivalDate||toIso(new Date());
  const lbl=isoToLabel(iso);
  active={id:Date.now(),date:lbl.date,day:lbl.day,isoDate:iso,arrival:st.arrival,loc:st.location};
  st={arrival:null,arrivalDate:null,departure:null,departureDate:null,location:null};
  depExpanded=false;persist();renderHome();toast('Příchod uložen ✓');
}
function saveEntry(){
  if(!st.arrival||!st.departure||!st.location){toast('Vyplň příchod, odchod a místo.');return;}
  const diff=calcMin(st.arrival,st.departure);
  if(diff<=0){toast('Odchod musí být po příchodu!');return;}
  const iso=st.arrivalDate||toIso(new Date());
  const lbl=isoToLabel(iso);
  entries.unshift({id:Date.now(),isoDate:iso,date:lbl.date,day:lbl.day,arrival:st.arrival,departure:st.departure,dur:fmtDur(diff),loc:st.location});
  st={arrival:null,arrivalDate:null,departure:null,departureDate:null,location:null};
  persist();renderHome();toast('Záznam uložen ✓');
}
function expandDep(){
  depExpanded=true;
  if(!st.departure)st.departure=nowStr();
  if(!st.departureDate)st.departureDate=toIso(new Date());
  renderHome();setTimeout(()=>{const el=document.getElementById('dep-input');if(el)el.focus();},50);
}
function collapseDep(){depExpanded=false;st.departure=null;st.departureDate=null;renderHome();}
function onDepInput(){const el=document.getElementById('dep-input');if(el){st.departure=el.value;renderHome();}}
function onDepDateInput(){const el=document.getElementById('dep-date-input');if(el)st.departureDate=el.value;}
function confirmDeparture(){
  const el=document.getElementById('dep-input');
  const dep=el?el.value:(st.departure||nowStr());
  if(!dep){toast('Zadej čas odchodu.');return;}
  const diff=calcMin(active.arrival,dep);
  if(diff<=0){toast('Odchod musí být po příchodu!');return;}
  const iso=st.departureDate||active.isoDate||toIso(new Date());
  const lbl=isoToLabel(iso);
  entries.unshift({id:Date.now(),isoDate:iso,date:lbl.date,day:lbl.day,arrival:active.arrival,departure:dep,dur:fmtDur(diff),loc:active.loc});
  active=null;st.departure=null;st.departureDate=null;depExpanded=false;
  persist();renderHome();toast('Záznam uložen ✓');
}

// ── CALENDAR ──
// ── VACATION HELPERS ──
function getVacData(year){
  return vacationData[year]||{carryoverDays:0,carryoverHours:0,baseDays:25,carryoverSet:false};
}
// Returns total vacation in hours for a year
function calcVacationTotal(year){
  const v=getVacData(year);
  return (v.baseDays*8)+(v.carryoverDays*8)+v.carryoverHours;
}
// Returns used vacation in hours for a year (from notes)
function calcVacationUsed(year){
  let usedHours=0;
  notes.forEach(n=>{
    if(!n.isoDate||n.type!=='vacation')return;
    const y=+n.isoDate.split('-')[0];
    if(y!==year)return;
    // exemptedHours = hours taken; if 0 but type is vacation, assume full day (8h)
    usedHours+=(n.exemptedHours||8);
  });
  return usedHours;
}
// Returns remaining vacation in hours
function calcVacationRemaining(year){
  return calcVacationTotal(year)-calcVacationUsed(year);
}
function fmtVacHours(h){
  if(h===0)return'0 dní';
  const sign=h<0?'−':'';
  const abs=Math.abs(h);
  const days=Math.floor(abs/8);
  const hours=abs%8;
  let s=sign;
  if(days>0)s+=days+(days===1?' den':days<5?' dny':' dní');
  if(hours>0)s+=(days>0?' ':'')+hours+'h';
  return s;
}

// Auto-carry-over on new year
(function autoCarryOver(){
  const today=new Date();
  const thisYear=today.getFullYear();
  const vThis=vacationData[thisYear]||{};
  if(!vThis.carryoverSet){
    const remH=calcVacationRemaining(thisYear-1);
    const remDays=remH>=0?Math.floor(remH/8):Math.ceil(remH/8);
    const remHours=remH%8;
    vacationData[thisYear]={
      carryoverDays:remDays,
      carryoverHours:remHours,
      baseDays:vThis.baseDays||25,
      carryoverSet:true
    };
    try{persistVacation();}catch(e){}
  }
})();

function renderCalendar(){
  const holidays=getCzechHolidays(calYear);
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const firstDow=new Date(calYear,calMonth,1).getDay(); // 0=Sun
  // convert to Mon-first: 0=Mon … 6=Sun
  const startOffset=(firstDow+6)%7;
  const today=toIso(new Date());

  // build quick lookup maps
  const entryMap={};
  entries.forEach(e=>{if(e.isoDate)entryMap[e.isoDate]=e;});
  const noteMap={};
  notes.forEach(n=>{if(n.isoDate)noteMap[n.isoDate]=n;});

  // month stats
  let totalMins=0,officeDays=0,homeDays=0;
  entries.forEach(e=>{
    if(!e.isoDate)return;
    const[y,m]=e.isoDate.split('-').map(Number);
    if(y===calYear&&m-1===calMonth){
      totalMins+=calcMin(e.arrival,e.departure);
      if(e.loc==='office')officeDays++;else homeDays++;
    }
  });

  // overtime for the displayed month (same logic as export: netto - 30min lunch, vacation/sick = neutral 8h netto)
  let monthOvertimeMins=0;
  {
    const daysInMonthCalc=new Date(calYear,calMonth+1,0).getDate();
    for(let dd=1;dd<=daysInMonthCalc;dd++){
      const isoCalc=calYear+'-'+(calMonth+1).toString().padStart(2,'0')+'-'+dd.toString().padStart(2,'0');
      const dowCalc=new Date(calYear,calMonth,dd).getDay();
      const isWeCalc=dowCalc===0||dowCalc===6;
      const mmddCalc=(calMonth+1).toString().padStart(2,'0')+'-'+dd.toString().padStart(2,'0');
      const isHolidayCalc=holidays.has(mmddCalc);
      const entryCalc=entryMap[isoCalc];
      const noteCalc=noteMap[isoCalc];
      if(isWeCalc||isHolidayCalc) continue; // weekends/holidays don't count toward overtime
      const workMinsCalc=entryCalc?calcMin(entryCalc.arrival,entryCalc.departure):0;
      const nettoMinsCalc=workMinsCalc>0?Math.max(0,workMinsCalc-30):0;
      if(noteCalc&&noteCalc.type==='vacation'){
        continue; // vacation always neutral, skip entirely
      }
      const exemptedMinsCalc=noteCalc?(noteCalc.exemptedHours||0)*60:0;
      const effectiveMinsCalc=nettoMinsCalc+exemptedMinsCalc;
      if(effectiveMinsCalc>0||exemptedMinsCalc>0){
        monthOvertimeMins+=(effectiveMinsCalc-480);
      }
    }
  }

  // year tabs — show prev/current/next year + any years with entries
  const thisYear=new Date().getFullYear();
  const allYears=new Set([thisYear-1,thisYear,thisYear+1]);
  entries.forEach(e=>{if(e.isoDate)allYears.add(+e.isoDate.split('-')[0]);});
  const yearsSorted=[...allYears].sort();

  let html='';

  // year row
  html+='<div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;">';
  yearsSorted.forEach(y=>{
    html+='<button class="cal-year-btn'+(y===calYear?' active':'')+'" onclick="setCalYear('+y+')">'+y+'</button>';
  });
  html+='</div>';

  // month nav
  html+='<div class="cal-nav">';
  html+='<button class="cal-nav-btn" onclick="calPrevMonth()">‹</button>';

  html+='<button class="cal-nav-btn" onclick="calNextMonth()">›</button>';
  html+='</div>';

  // day-of-week headers (Mon–Sun)
  html+='<div class="cal-dow">';

    html+='<div class="cal-dow-cell'+(i>=5?' we':'')+'">' +d+'</div>';
  });
  html+='</div>';

  // grid
  html+='<div class="cal-grid">';
  // empty cells before first day
  for(let i=0;i<startOffset;i++) html+='<div class="cal-day empty"></div>';

  for(let d=1;d<=daysInMonth;d++){
    const iso=calYear+'-'+(calMonth+1).toString().padStart(2,'0')+'-'+d.toString().padStart(2,'0');
    const dow=new Date(calYear,calMonth,d).getDay(); // 0=Sun,6=Sat
    const isWe=dow===0||dow===6;
    const mmdd=(calMonth+1).toString().padStart(2,'0')+'-'+d.toString().padStart(2,'0');
    const isHoliday=holidays.has(mmdd);
    const entry=entryMap[iso];
    const note=noteMap[iso];
    const isToday=iso===today;

    const noteLabelsCal={vacation:'Dovolená',sick:'Nemoc',doctor:'Lékař',trip:'Služební cesta',third:'Třetí strana',custom:''};
    const noteIconsCal={vacation:'🏖',sick:'🤒',doctor:'🏥',trip:'✈️',third:'🤝',custom:'📝'};

    let cls='cal-day';
    let styleAttr='';
    if(isWe||isHoliday) cls+=' weekend';
    if(isHoliday) cls+=' holiday';

    if(entry&&note){
      // Mixed day: work + absence — diagonal split background by ratio
      const workMins=calcMin(entry.arrival,entry.departure);
      const absMins=(note.exemptedHours||0)*60;
      const totalMins=Math.max(workMins+absMins,1);
      const pct=Math.round((workMins/totalMins)*100);
      const workColor=entry.loc==='office'?'#FDF0C0':'#C8EDEF';
      cls+=(entry.loc==='office'?' has-mixed-office':' has-mixed-home');
      styleAttr=' style="background:linear-gradient(135deg, '+workColor+' 0%, '+workColor+' '+pct+'%, #EFEDE6 '+pct+'%, #EFEDE6 100%);"';
    } else if(entry){
      cls+=(entry.loc==='office'?' has-entry-office':' has-entry-home');
    } else if(note){
      cls+=' has-note';
    }
    if(isToday) cls+=' today';

    html+='<div class="'+cls+'"'+styleAttr+' onclick="openDay(\''+iso+'\')">';
    html+='<div class="cd-num">'+d+'</div>';
    if(entry){
      html+='<div class="cd-time">'+entry.arrival+'–'+entry.departure+'</div>';
      if(!note){
        const mins=calcMin(entry.arrival,entry.departure);
        if(mins>0)html+='<div class="cd-dur">'+fmtDur(mins)+'</div>';
      }
    }
    if(note){
      const lbl=noteLabelsCal[note.type]||'Pozn.';
      const hrs=note.exemptedHours?' '+note.exemptedHours+'h':'';
      html+='<div class="cd-note">'+(noteIconsCal[note.type]||'📝')+' '+lbl+hrs+'</div>';
    }
    if(isHoliday&&!entry&&!note){
      const hname=HOLIDAY_NAMES[mmdd]||'Svátek';
      html+='<div class="cd-hday">'+hname+'</div>';
    }
    html+='</div>';
  }
  html+='</div>';

  // summary
  html+='<div class="cal-summary">';
  const overtimeStr=fmtOvertime(monthOvertimeMins);
  const overtimeColor=monthOvertimeMins<0?'var(--red)':monthOvertimeMins>0?'var(--teal)':'var(--txt3)';
  html+='<div class="cal-sum-item"><div class="cal-sum-val">'+fmtDurLong(totalMins)+' <span style="font-size:11px;font-weight:600;color:'+overtimeColor+'">('+overtimeStr+')</span></div><div class="cal-sum-lbl">Odpracováno</div></div>';
  html+='<div class="cal-sum-item"><div class="cal-sum-val">'+officeDays+'</div><div class="cal-sum-lbl">Kancelář</div></div>';
  html+='<div class="cal-sum-item"><div class="cal-sum-val">'+homeDays+'</div><div class="cal-sum-lbl">Homeoffice</div></div>';
  html+='</div>';

  // export buttons
  // Vacation card
  const vacTotal=calcVacationTotal(calYear);
  const vacUsed=calcVacationUsed(calYear);
  const vacRemaining=calcVacationRemaining(calYear);
  const vacIsExpanded=(window._vacExpanded===calYear);
  const vd=getVacData(calYear);
  const vacColor=vacRemaining<0?'var(--red)':vacRemaining<80?'var(--gold)':'var(--teal)';

  html+='<div class="vac-card" onclick="toggleVacCard()">';
  html+='<div class="vac-main">';
  html+='<span class="vac-icon">🏖</span>';
  html+='<span class="vac-label">Zbývá dovolená</span>';
  html+='<span class="vac-val" style="color:'+vacColor+'">'+fmtVacHours(vacRemaining)+'</span>';
  html+='<span class="vac-chevron">'+(vacIsExpanded?'▲':'▼')+'</span>';
  html+='</div>';
  if(vacIsExpanded){
    html+='<div class="vac-detail">';
    html+='<div class="vac-detail-row"><span>Základ</span><span>'+vd.baseDays+' dní</span></div>';
    html+='<div class="vac-detail-row"><span>Převod z '+(calYear-1)+'</span><span class="vac-detail-edit">';
    html+='<button class="vac-adj-btn" onclick="adjCarryover(-1,0,event)">−</button>';
    html+='<span id="vac-co-val">'+fmtVacHours(vd.carryoverDays*8+vd.carryoverHours)+'</span>';

    html+='<div class="vac-detail-row vac-total"><span>Zbývá</span><span style="color:'+vacColor+'">'+fmtVacHours(vacRemaining)+'</span></div>';
    html+='</div>';

  html+='</div>';

  html+='<div class="export-row">';
  html+='<button class="export-btn primary" onclick="exportCalendar()">📥 Export kalendáře '+calYear+'</button>';

  html+='</div>';

  document.getElementById('cal-page').innerHTML=html;

// ── DAY SHEET ──
let sheetIso=null;
const NOTE_TYPES=[
  {k:'vacation', l:'🏖 Dovolená',    defaultHours:8},
  {k:'sick',     l:'🤒 Nemoc',       defaultHours:8},
  {k:'doctor',   l:'🏥 Lékař',       defaultHours:0},
  {k:'trip',     l:'✈️ Služební cesta', defaultHours:0},
  {k:'third',    l:'🤝 Třetí strana', defaultHours:0},
  {k:'custom',   l:'📝 Vlastní',     defaultHours:0},
];

function openDay(iso){
  sheetIso=iso;
  const note=notes.find(n=>n.isoDate===iso);
  _selectedNoteType=note?note.type:'';
  _exemptedHours=note?note.exemptedHours||0:0;
  renderSheet();
  document.getElementById('sheet-overlay').classList.add('open');
  document.getElementById('day-sheet').classList.add('open');
}
function closeSheet(){
  document.getElementById('sheet-overlay').classList.remove('open');
  document.getElementById('day-sheet').classList.remove('open');
  sheetIso=null;
}

function renderSheet(){
  if(!sheetIso)return;
  const dt=isoToDate(sheetIso);
  const dow=dt.getDay();
  const isWe=dow===0||dow===6;
  const [y,m,d]=sheetIso.split('-').map(Number);
  const mmdd=(m).toString().padStart(2,'0')+'-'+d.toString().padStart(2,'0');
  const holidays=getCzechHolidays(y);
  const isHoliday=holidays.has(mmdd);
  const hname=HOLIDAY_NAMES[mmdd]||'Svátek';

  const entry=entries.find(e=>e.isoDate===sheetIso);
  const note=notes.find(n=>n.isoDate===sheetIso);
  const currentLoc=entry?entry.loc:'office';
  const currentNoteType=note?note.type:'';

  const dayName=DAYS[dow]+' '+d+'. '+MONTHS_LABEL[m-1]+' '+y;
  let subLine=isHoliday?hname:(isWe?'Víkend':'');

  let html='<div class="sheet-title">'+dayName+'</div>';
  if(subLine) html+='<div class="sheet-sub'+(isHoliday?' holiday':'')+'">'+(isHoliday?'🎉 ':'')+subLine+'</div>';
  else html+='<div style="margin-bottom:16px"></div>';

  // work times
  html+='<div class="sf-label">Pracovní doba</div>';
  html+='<div class="sf-row"><label>Příchod</label><input type="time" id="sf-arr" value="'+(entry?entry.arrival:'')+'" placeholder="--:--"></div>';
  html+='<div class="sf-row"><label>Odchod</label><input type="time" id="sf-dep" value="'+(entry?entry.departure:'')+'" placeholder="--:--" oninput="updateSheetDur()"></div>';
  const mins=entry?calcMin(entry.arrival,entry.departure):0;
  html+='<div class="sf-dur" id="sf-dur">'+(mins>0?'Odpracováno: '+fmtDurLong(mins):'')+'</div>';

  // location
  html+='<div class="sf-loc-row">';
  html+='<button class="sf-loc-btn'+(currentLoc==='office'?' sel':'')+'" id="sfloc-office" onclick="sheetSetLoc(\'office\')">🏢 Kancelář</button>';
  html+='<button class="sf-loc-btn'+(currentLoc==='home'?' sel':'')+'" id="sfloc-home" onclick="sheetSetLoc(\'home\')">🏠 Homeoffice</button>';
  html+='</div>';

  // absence note
  const currentExempted = note ? (note.exemptedHours||0) : 0;
  html+='<div class="sf-label">Absence / poznámka</div>';
  html+='<div class="sf-note-chips">';
  NOTE_TYPES.forEach(nt=>{
    html+='<button class="sf-chip'+(currentNoteType===nt.k?' sel':'')+'" onclick="sheetToggleNote(\''+nt.k+'\')">'+nt.l+'</button>';
  });
  html+='</div>';
  // Exempted hours control (shown when note type selected)
  const showHours=!!currentNoteType;
  html+='<div class="sf-hours-row" id="sf-hours-row" style="'+(showHours?'':'display:none')+'">';
  html+='<span class="sf-hours-label">Omluvené hodiny</span>';
  html+='<div class="sf-hours-ctrl">';
  html+='<button class="sf-hours-btn" onclick="changeHours(-0.5)">−</button>';
  html+='<span class="sf-hours-val" id="sf-hours-val">'+(currentExempted||0)+'h</span>';
  html+='<button class="sf-hours-btn" onclick="changeHours(0.5)">+</button>';
  html+='</div></div>';
  html+='<textarea class="sf-note-input" id="sf-note-text" rows="2" placeholder="Vlastní poznámka…">'+(note?note.text||'':'')+'</textarea>';

  html+='<button class="sheet-save" onclick="saveDay()">Uložit</button>';
  if(entry||note) html+='<button class="sheet-del" onclick="deleteDay()">Smazat záznam</button>';

  document.getElementById('sheet-content').innerHTML=html;
}

function updateSheetDur(){
  const a=document.getElementById('sf-arr').value;
  const d=document.getElementById('sf-dep').value;
  const el=document.getElementById('sf-dur');
  if(el&&a&&d){const m=calcMin(a,d);el.textContent=m>0?'Odpracováno: '+fmtDurLong(m):'';}
}

function sheetSetLoc(loc){
  document.getElementById('sfloc-office').className='sf-loc-btn'+(loc==='office'?' sel':'');
  document.getElementById('sfloc-home').className='sf-loc-btn'+(loc==='home'?' sel':'');
}

function sheetToggleNote(type){
  const chips=document.querySelectorAll('.sf-chip');
  chips.forEach(c=>{
    const isThis=c.textContent.includes(NOTE_TYPES.find(n=>n.k===type).l.replace(/./,'').trim());
    // toggle by checking onclick attr
  });
  NOTE_TYPES.forEach(nt=>{
    const btn=document.querySelector('.sf-chip[onclick="sheetToggleNote(\''+nt.k+'\')"]');
    if(btn) btn.className='sf-chip'+(nt.k===type&&!btn.classList.contains('sel')?' sel':'');
  });
  // re-render chips toggling
  renderSheetChips(type);
}

let _selectedNoteType='';
function renderSheetChips(toggle){
  if(_selectedNoteType===toggle) _selectedNoteType='';
  else _selectedNoteType=toggle;
  NOTE_TYPES.forEach(nt=>{
    const btn=document.querySelector('.sf-chip[onclick="sheetToggleNote(\''+nt.k+'\')"]');
    if(btn) btn.className='sf-chip'+(_selectedNoteType===nt.k?' sel':'');
  });
  // Show/hide hours row and set default
  const row=document.getElementById('sf-hours-row');
  if(row){
    if(_selectedNoteType){
      row.style.display='flex';
      // Set default hours if currently 0
      const valEl=document.getElementById('sf-hours-val');
      if(valEl&&valEl.textContent==='0h'){
        const nt=NOTE_TYPES.find(n=>n.k===_selectedNoteType);
        if(nt&&nt.defaultHours>0){
          _exemptedHours=nt.defaultHours;
          valEl.textContent=_exemptedHours+'h';
        }
      }
    } else {
      row.style.display='none';
    }
  }
}

let _exemptedHours=0;
function changeHours(delta){
  _exemptedHours=Math.max(0,Math.min(24,(_exemptedHours||0)+delta));
  const el=document.getElementById('sf-hours-val');
  if(el) el.textContent=_exemptedHours+'h';
}

function saveDay(){
  const arr=document.getElementById('sf-arr').value;
  const dep=document.getElementById('sf-dep').value;
  const loc=document.getElementById('sfloc-office').classList.contains('sel')?'office':'home';
  const noteText=document.getElementById('sf-note-text').value.trim();
  const noteType=_selectedNoteType||notes.find(n=>n.isoDate===sheetIso)?.type||'';

  // save/update work entry
  if(arr&&dep){
    const diff=calcMin(arr,dep);
    if(diff<=0){toast('Odchod musí být po příchodu!');return;}
    const lbl=isoToLabel(sheetIso);
    const existing=entries.findIndex(e=>e.isoDate===sheetIso);
    const rec={id:existing>=0?entries[existing].id:Date.now(),isoDate:sheetIso,date:lbl.date,day:lbl.day,arrival:arr,departure:dep,dur:fmtDur(diff),loc};
    if(existing>=0) entries[existing]=rec; else entries.unshift(rec);
  } else {
    // remove entry if times cleared
    entries=entries.filter(e=>e.isoDate!==sheetIso);
  }

  // save/update note
  if(noteType||noteText||_exemptedHours>0){
    const ni=notes.findIndex(n=>n.isoDate===sheetIso);
    const rec={isoDate:sheetIso,type:noteType||'custom',text:noteText,exemptedHours:_exemptedHours};
    if(ni>=0) notes[ni]=rec; else notes.push(rec);
  } else {
    notes=notes.filter(n=>n.isoDate!==sheetIso);
  }

  _selectedNoteType='';_exemptedHours=0;
  persist();closeSheet();renderCalendar();toast('Uloženo ✓');
}

function deleteDay(){
  entries=entries.filter(e=>e.isoDate!==sheetIso);
  notes=notes.filter(n=>n.isoDate!==sheetIso);
  _selectedNoteType='';
  persist();closeSheet();renderCalendar();toast('Smazáno');
}


// ── XLSX EXPORT ──
function buildMonthData(year, month){
  const holidays = getCzechHolidays(year);
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const entryMap = {};
  entries.forEach(e=>{ if(e.isoDate) entryMap[e.isoDate]=e; });
  const noteMap = {};
  notes.forEach(n=>{ if(n.isoDate) noteMap[n.isoDate]=n; });

  const rows = [];
  let totalMins = 0;

  for(let d=1; d<=daysInMonth; d++){
    const iso = year+'-'+(month+1).toString().padStart(2,'0')+'-'+d.toString().padStart(2,'0');
    const dt = new Date(year, month, d);
    const dow = dt.getDay();
    const isWe = dow===0||dow===6;
    const mmdd = (month+1).toString().padStart(2,'0')+'-'+d.toString().padStart(2,'0');
    const isHoliday = holidays.has(mmdd);
    const entry = entryMap[iso];
    const note = noteMap[iso];
    const dayName = DAYS[dow];
    const mins = entry ? calcMin(entry.arrival, entry.departure) : 0;
    if(mins>0) totalMins+=mins;

    const hname = HOLIDAY_NAMES[mmdd]||'';
    const noteLabels={vacation:'Dovolená',sick:'Nemoc',doctor:'Lékař',trip:'Služební cesta',third:'Práce pro třetí stranu',custom:''};
    let poznamka = '';
    let exemptedHours = 0;
    if(note){
      const lbl=noteLabels[note.type]||'';
      const hrs=note.exemptedHours>0?' '+note.exemptedHours+'h':'';
      const txt=note.text?' – '+note.text:'';
      poznamka=lbl+hrs+txt;
      exemptedHours=note.exemptedHours||0;
    } else if(isHoliday) poznamka = hname;

    const nettoMins = mins>0 ? Math.max(0, mins-30) : 0;
    // Effective mins for overtime: netto + exempted (in mins), capped per day
    const exemptedMins = exemptedHours*60;
    const effectiveMins = nettoMins + exemptedMins;
    // Overtime: effective - 8h (480 min). Vacation = neutral (0)
    let overtimeMins = 0;
    if(note&&note.type==='vacation'){
      overtimeMins = 0; // always neutral
    } else if(!isWe&&!isHoliday){
      // Only count overtime on working days
      if(effectiveMins>0||exemptedMins>0){
        overtimeMins = effectiveMins - 480;
      }
    }

    rows.push({
      iso, d, dayName, isWe, isHoliday,
      datum: d+'. '+(month+1)+'. '+year,
      den: dayName,
      prichod: entry ? entry.arrival : '',
      odchod: entry ? entry.departure : '',
      odpracovano: mins>0 ? fmtDurLong(mins) : '',
      odpracovanoMins: mins,
      netto: nettoMins>0 ? fmtDurLong(nettoMins) : '',
      nettoMins,
      exemptedHours,
      exemptedStr: exemptedHours>0 ? exemptedHours+'h' : '',
      overtimeMins,
      overtimeStr: (!isWe&&!isHoliday&&(effectiveMins>0||exemptedMins>0)) ? fmtOvertime(overtimeMins) : '',
      misto: entry ? (entry.loc==='office'?'Kancelář':'Homeoffice') : '',
      poznamka
    });
  }
  return { rows, totalMins };
}

function mkFill(rgb){return {patternType:'solid',fgColor:{rgb},bgColor:{indexed:64}};}
function mkBorder(c){const s={style:'thin',color:{rgb:c}};return{top:s,bottom:s,left:s,right:s};}

function applySheetStyles(ws, rows, startRow){
  const cols=['A','B','C','D','E','F','G','H','I','J'];

  // Title row — white bg, black bold
  if(ws['A1']) ws['A1'].s={fill:mkFill('FFFFFF'),font:{name:'Verdana',sz:13,bold:true,color:{rgb:'1A1A1A'}},alignment:{horizontal:'left',vertical:'center'}};
  // Subtitle — white bg, gray italic
  if(ws['A2']&&ws['A2'].v) ws['A2'].s={fill:mkFill('FFFFFF'),font:{name:'Verdana',sz:9,italic:true,color:{rgb:'666666'}},alignment:{horizontal:'left',vertical:'center'}};
  // Empty row 3
  cols.forEach(col=>{const r=col+'3';if(!ws[r])ws[r]={t:'s',v:''};ws[r].s={fill:mkFill('FFFFFF'),border:mkBorder('FFFFFF'),font:{name:'Verdana',sz:6}};});

  // Header row — gold bg, black bold
  cols.forEach(col=>{
    const ref=col+startRow;
    if(!ws[ref])ws[ref]={t:'s',v:''};
    ws[ref].s={fill:mkFill('C8A450'),font:{name:'Verdana',sz:9,bold:true,color:{rgb:'1A1A1A'}},alignment:{horizontal:'center',vertical:'center'},border:mkBorder('B8942A')};
  });

  // Data rows
  rows.forEach((row,i)=>{
    const r=startRow+1+i;
    const rowBg=(row.isWe||row.isHoliday)?'FEF5F5':'FFFFFF';
    const border=mkBorder('ECECEC');

    cols.forEach((col,ci)=>{
      const ref=col+r;
      if(!ws[ref])ws[ref]={t:'s',v:''};
      const val=String(ws[ref].v||'');

      // Default style
      let font={name:'Verdana',sz:9,color:{rgb:'1A1A1A'}};
      if(ci<2) font.bold=true;

      // Colored text by column and value
      if(ci===1&&(row.isWe||row.isHoliday)){
        font.color={rgb:'B83030'};font.bold=true;
      } else if(ci===7&&val){ // Přesčas
        const neg=val.startsWith('-')||val.startsWith('−');
        font.color={rgb:neg?'B83030':(val==='+0h'||val==='0h')?'777777':'1A6B3A'};
        font.bold=true;
      } else if(ci===8&&val){ // Místo
        font.color={rgb:val==='Kancelář'?'9A7010':val==='Homeoffice'?'006B78':'1A1A1A'};
        font.bold=true;
      } else if(ci===6&&val){ // Omluveno
        font.color={rgb:'777777'};font.bold=true;
      } else if(ci===9&&val){ // Poznámka
        // vacation = gold, others = gray
        const isVac=val.toLowerCase().includes('dovolená');
        font.color={rgb:isVac?'9A7010':'777777'};
      }

      ws[ref].s={fill:mkFill(rowBg),font,alignment:{horizontal:ci<2?'left':'center',vertical:'center'},border};
    });
  });

  // Sum row
  const sumR=startRow+1+rows.length;
  cols.forEach((col,ci)=>{
    const ref=col+sumR;
    if(!ws[ref])ws[ref]={t:'s',v:''};
    const val=String(ws[ref].v||'');
    let font={name:'Verdana',sz:9,bold:true,color:{rgb:'1A1A1A'}};
    if(ci===7&&val){
      const neg=val.startsWith('-')||val.startsWith('−');
      font.color={rgb:neg?'B83030':'1A6B3A'};
    }
    ws[ref].s={fill:mkFill('FAFAFA'),font,alignment:{horizontal:ci<2?'left':'center',vertical:'center'},border:{top:{style:'medium',color:{rgb:'C8A450'}},bottom:{style:'thin',color:{rgb:'ECECEC'}},left:{style:'thin',color:{rgb:'ECECEC'}},right:{style:'thin',color:{rgb:'ECECEC'}}}};
  });

  // YTD row
  const ytdR=startRow+2+rows.length;
  cols.forEach((col,ci)=>{
    const ref=col+ytdR;
    if(!ws[ref])ws[ref]={t:'s',v:''};
    ws[ref].s={fill:mkFill('FAFAFA'),font:{name:'Verdana',sz:9,bold:true,color:{rgb:'1A1A1A'}},alignment:{horizontal:ci<2?'left':'center',vertical:'center'},border:mkBorder('ECECEC')};
  });
}

function buildWorksheet(year, month){
  const MONTHS_CZ=['Leden','Únor','Březen','Duben','Květen','Červen','Červenec','Srpen','Září','Říjen','Listopad','Prosinec'];
  const { rows, totalMins } = buildMonthData(year, month);
  const wsData = [];

  // Title rows
  wsData.push([MONTHS_CZ[month]+' '+year,'','','','','','','','','']);
  wsData.push([userName?'Zaměstnanec: '+userName:'','','','','','','','','']);
  wsData.push([]); // empty
  // Header
  wsData.push(['Datum','Den','Příchod','Odchod','Odpracováno','Netto (−30 min)','Omluveno','Přesčasy','Místo','Poznámka']);
  // Data rows
  rows.forEach(row=>{
    wsData.push([row.datum, row.den, row.prichod, row.odchod, row.odpracovano, row.netto, row.exemptedStr, row.overtimeStr, row.misto, row.poznamka]);
  });
  // Total
  const totalNetto=rows.reduce((s,r)=>s+r.nettoMins,0);
  const totalOvertime=rows.reduce((s,r)=>s+r.overtimeMins,0);
  // Cumulative overtime YTD (sum all months up to this one)
  let ytdOvertime=0;
  for(let m2=0;m2<=month;m2++){
    try{
      const {rows:r2}=buildMonthData(year,m2);
      ytdOvertime+=r2.reduce((s,r)=>s+(r.overtimeMins||0),0);
    }catch(e){console.warn('ytd error m='+m2,e);}
  }
  wsData.push(['SOUČET MĚSÍCE','','','',fmtDurLong(totalMins),fmtDurLong(totalNetto),'',fmtOvertime(totalOvertime),'','']);
  wsData.push(['KUMULATIVNÍ PŘESČASY YTD','','','','','','',fmtOvertime(ytdOvertime),'','']);

  if(!wsData||wsData.length===0){console.error('wsData empty for',year,month);return XLSX.utils.aoa_to_sheet([[]]);}
  const ws = XLSX.utils.aoa_to_sheet(wsData);

  // Merges: title + subtitle
  ws['!merges'] = [
    {s:{r:0,c:0},e:{r:0,c:9}},
    {s:{r:1,c:0},e:{r:1,c:9}}
  ];

  // Title and subtitle styles applied in applySheetStyles

  // Apply row styles (header is now row 4 = Excel row index 3+1=4)
  // Dynamic column widths based on content
  const colDefs = [14,10,9,9,14,14,10,12,13,30]; // default widths
  wsData.forEach(row=>{
    row.forEach((cell,ci)=>{
      if(cell==null) return;
      const len = String(cell).length;
      if(len > (colDefs[ci]||0)) colDefs[ci] = Math.min(len+2, 80);
    });
  });
  ws['!cols'] = colDefs.map(w=>({wch:w}));
  applySheetStyles(ws, rows, 4);

  // Row heights
  ws['!rows'] = [{hpt:22},{hpt:14},{hpt:4},{hpt:18},...rows.map(()=>({hpt:18})),{hpt:20},{hpt:18}];

  return ws;
}

function exportCalendar(){
  if(typeof XLSX==='undefined'){toast('Načítám knihovnu…');return;}
  try{
    const MONTHS_CZ=['Leden','Únor','Březen','Duben','Květen','Červen','Červenec','Srpen','Září','Říjen','Listopad','Prosinec'];
    const wb = XLSX.utils.book_new();
    for(let m=0; m<12; m++){
      const ws = buildWorksheet(calYear, m);
      XLSX.utils.book_append_sheet(wb, ws, MONTHS_CZ[m]);
    }
    const monthNum = (calMonth+1).toString().padStart(2,'0');
    const namePart = userName ? '_'+userName.replace(/\s+/g,'_') : '';
    const filename = 'Dochazka_'+monthNum+'_'+calYear+namePart+'.xlsx';
    // Active sheet: mark via SheetNames index
    wb.Workbook = wb.Workbook||{};
    wb.Workbook.Sheets = Array.from({length:12},(_,i)=>({
      Hidden:0,
      Selected: i===calMonth ? 1 : 0
    }));
    wb.Workbook.WBView = [{activeTab:calMonth, FirstSheet:0}];
    XLSX.writeFile(wb, filename, {cellStyles:true});
    toast('Export stažen ✓');
  }catch(err){
    console.error('Export error:',err);
    toast('Chyba exportu: '+err.message);
  }
}

// ── REMINDER ──
function toggleReminder(){
  if(!reminderOn){
    // Request notification permission first
    if(!('Notification' in window)){toast('Oznámení nejsou podporována.');return;}
    Notification.requestPermission().then(perm=>{
      if(perm==='granted'){
        reminderOn=true;
        persist();
        scheduleReminder();
        renderCalendar();
        toast('Připomínka zapnuta ✓');
      } else {
        toast('Povolte oznámení v nastavení prohlížeče.');
      }
    });
  } else {
    reminderOn=false;
    persist();
    cancelReminder();
    renderCalendar();
    toast('Připomínka vypnuta');
  }
}

function saveReminderTime(){
  const el=document.getElementById('reminder-time');
  if(!el)return;
  const parts=el.value.split(':');
  reminderHour=parts[0]||'09';
  reminderMin=parts[1]||'00';
  persist();
  scheduleReminder();
  renderCalendar();
  toast('Čas připomínky uložen ✓');
}

// Returns the date of the reminder: 3 working days before end of month
function getReminderDate(year, month){
  const lastDay=new Date(year,month+1,0);
  const holidays=getCzechHolidays(year);
  let workDaysFromEnd=0;
  let d=new Date(lastDay);
  while(workDaysFromEnd<3){
    const dow=d.getDay();
    const mmdd=(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0');
    if(dow!==0&&dow!==6&&!holidays.has(mmdd)) workDaysFromEnd++;
    if(workDaysFromEnd<3) d.setDate(d.getDate()-1);
  }
  return d;
}

function scheduleReminder(){
  if(!reminderOn||!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.ready.then(reg=>{
    const now=new Date();
    // Schedule for current and next month
    for(let offset=0;offset<=1;offset++){
      let y=now.getFullYear(), m=now.getMonth()+offset;
      if(m>11){m=0;y++;}
      const remDate=getReminderDate(y,m);
      remDate.setHours(parseInt(reminderHour),parseInt(reminderMin),0,0);
      if(remDate>now){
        const delay=remDate.getTime()-now.getTime();
        const monthName=MONTHS_NAMES[m];
        // Store reminder info for SW
        localStorage.setItem('reminder_pending',JSON.stringify({
          fireAt:remDate.getTime(),
          title:'📋 Docházka — export',
          body:'Nezapomeň exportovat docházku za '+monthName+' '+y+'.'
        }));
      }
    }
    // Tell SW to start checking
    if(reg.active) reg.active.postMessage({type:'SCHEDULE_REMINDER'});
  }).catch(()=>{});
}

function cancelReminder(){
  localStorage.removeItem('reminder_pending');
  if('serviceWorker' in navigator){
    navigator.serviceWorker.ready.then(reg=>{
      if(reg.active) reg.active.postMessage({type:'CANCEL_REMINDER'});
    }).catch(()=>{});
  }
}

// Re-schedule on load if reminder is on
if(reminderOn) setTimeout(scheduleReminder, 1000);

// ── VACATION CARD ──
window._vacExpanded=null;
function toggleVacCard(){
  window._vacExpanded=(window._vacExpanded===calYear)?null:calYear;
  renderCalendar();
}
function adjCarryover(deltaDays, deltaHours, e){
  if(e)e.stopPropagation();
  const v=getVacData(calYear);
  let totalH=(v.carryoverDays*8)+(v.carryoverHours||0)+(deltaDays*8)+deltaHours;
  // Allow negative carryover (debt from previous year)
  vacationData[calYear]={
    ...v,
    carryoverDays:Math.floor(totalH/8),
    carryoverHours:totalH%8,
    carryoverSet:true
  };
  persist();renderCalendar();
}

const CACHE='dochazka-v5';

function checkReminder(){
  try{
    const raw=self.registration?null:null; // can't access localStorage from SW directly
    // SW will receive message from page with reminder data
  }catch(e){}
}

self.addEventListener('message',e=>{
  if(e.data&&e.data.type==='SCHEDULE_REMINDER'){
    if(reminderTimer) clearInterval(reminderTimer);
    // Check every minute
    reminderTimer=setInterval(()=>{
      e.source&&e.source.postMessage({type:'CHECK_REMINDER'});
    },60000);
  }
  if(e.data&&e.data.type==='CANCEL_REMINDER'){
    if(reminderTimer){clearInterval(reminderTimer);reminderTimer=null;}
  }
  if(e.data&&e.data.type==='FIRE_NOTIFICATION'){
    self.registration.showNotification(e.data.title,{

      badge:'icon-192.png',
      tag:'export-reminder',
      requireInteraction:false
    });
  }
});
`;
  const swBlob=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(swBlob)).then(reg=>{
    // Listen for CHECK_REMINDER from SW
    navigator.serviceWorker.addEventListener('message',e=>{
      if(e.data&&e.data.type==='CHECK_REMINDER'){
        const raw=localStorage.getItem('reminder_pending');
        if(!raw)return;
        const rem=JSON.parse(raw);
        if(Date.now()>=rem.fireAt){
          localStorage.removeItem('reminder_pending');
          reg.active&&reg.active.postMessage({type:'FIRE_NOTIFICATION',title:rem.title,body:rem.body});
          // Re-schedule for next month
          if(reminderOn) setTimeout(scheduleReminder,2000);
        }
      }
    });
  }).catch(()=>{});
}
